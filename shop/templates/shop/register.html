{% extends 'shop/base.html' %}
{% block title %}Register - PyMart{% endblock %}
{% block content %}

<div class="container">
    <div class="auth-card">
        <h3><i class="fas fa-user-plus me-2" style="color:#f0c040"></i>Create Account</h3>
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                <div style="color:#555; font-size:0.8rem; margin-top:4px">{{ field.help_text }}</div>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-100 mt-2">Create My Account</button>
        </form>
        <p style="color:#666; text-align:center; margin-top:20px">
            Already have account? <a href="/login/" style="color:#f0c040">Login here</a>
        </p>
    </div>
</div>

{% endblock %}

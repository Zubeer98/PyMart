{% extends 'shop/base.html' %}
{% block title %}Login - PyMart{% endblock %}
{% block content %}

<div class="container">
    <div class="auth-card">
        <h3><i class="fas fa-sign-in-alt me-2" style="color:#f0c040"></i>Login</h3>
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-100 mt-2">Login to PyMart</button>
        </form>
        <p style="color:#666; text-align:center; margin-top:20px">
            No account? <a href="/register/" style="color:#f0c040">Register here</a>
        </p>
    </div>
</div>

{% endblock %}
